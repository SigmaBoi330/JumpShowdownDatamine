<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Sound Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Roblox Sound Explorer</h1>
        <input type="text" id="searchInput" placeholder="Search for a sound name...">
        <table id="soundTable">
            <thead>
                <tr>
                    <th>Great Grandparent</th>
                    <th>Grandparent</th>
                    <th>Parent</th>
                    <th>Name</th>
                    <th>Sound ID</th>
                </tr>
            </thead>
            <tbody id="soundTableBody">
                <!-- JavaScript will populate this -->
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
